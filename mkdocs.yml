site_name: GVVSS Documentation Portal

theme:
  name: material
  custom_dir: overrides
  logo: material/shield-check     # Changes the top-left logo
  favicon: material/shield-check  # Changes the browser tab icon
  # 1. UI Features
  features:
    - navigation.tabs          # Moves top-level folders to a top menu bar
    - navigation.sections      # Makes the sidebar look cleaner
    - navigation.top           # Adds a "back to top" arrow when scrolling
    - navigation.tracking      # NEW: Shows a circular scroll progress bar
    - navigation.footer        # NEW: Adds Next/Previous buttons at the bottom of pages
    - search.suggest           # Auto-suggests results as users type
    - search.highlight         # Highlights the search term on the page
    - content.code.copy        # NEW: Adds a "Copy" button to code blocks
  
  # 2. Color Palette & Dark Mode Toggle
  palette:
    # Light mode settings
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo          # Change this to your company's main color (e.g., blue, red, teal)
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode settings
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

# 3. Markdown Power-Ups (Allows call-out boxes and advanced formatting)
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

# 4. Versioning Dropdown (Powered by mike)
extra:
  version:
    provider: mike

# 5. Plugins (Adds the "Last Updated" timestamp)
plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: false
      type: date

# Your Navigation Menu
nav:
  - Home: index.md
  - template: template/index.md
  - GVVSS Reports Portal: ocr-system/index.md
  - GVVSS OCR Google Script: ocr-google-script/index.md